openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: blindkiss API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: events
  - name: bkid
  - name: settings
  - name: content
  - name: tracks
  - name: auth
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [upcoming, past, all]
            default: all
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events, admin]
      summary: Create an event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    put:
      operationId: updateEvent
      tags: [events, admin]
      summary: Update event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events, admin]
      summary: Delete event (admin)
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /bkid:
    get:
      operationId: listBkidMembers
      tags: [bkid, admin]
      summary: List BK-ID members (admin)
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BkidMember"
    post:
      operationId: createBkidMember
      tags: [bkid]
      summary: Generate a new BK-ID card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BkidInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BkidMember"

  /bkid/stats:
    get:
      operationId: getBkidStats
      tags: [bkid]
      summary: Public BK-ID stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BkidStats"

  /settings:
    get:
      operationId: getSiteSettings
      tags: [settings]
      summary: Get public site settings (colors, glitch, audio, recruitment)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    put:
      operationId: updateSiteSettings
      tags: [settings, admin]
      summary: Update site settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettings"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /content:
    get:
      operationId: listContentBlocks
      tags: [content]
      summary: List content blocks (texts and image references)
      responses:
        "200":
          description: Blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentBlock"
  /content/{key}:
    parameters:
      - in: path
        name: key
        required: true
        schema:
          type: string
    put:
      operationId: updateContentBlock
      tags: [content, admin]
      summary: Update content block (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentBlockInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentBlock"

  /tracks:
    get:
      operationId: listTracks
      tags: [tracks]
      summary: List audio tracks (cassette player)
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Track"
    post:
      operationId: createTrack
      tags: [tracks, admin]
      summary: Add track (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
  /tracks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    delete:
      operationId: deleteTrack
      tags: [tracks, admin]
      summary: Delete track (admin)
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /auth/me:
    get:
      operationId: adminMe
      tags: [auth]
      summary: Current admin session
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    Event:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        venue: { type: string }
        city: { type: string }
        address: { type: string }
        mapsUrl: { type: string, nullable: true }
        ticketUrl: { type: string, nullable: true }
        price: { type: string, nullable: true }
        eventDate: { type: string, format: date-time }
        posterUrl: { type: string, nullable: true }
        description: { type: string, nullable: true }
        forcePast: { type: boolean }
        isPast: { type: boolean }
      required: [id, title, venue, city, address, eventDate, forcePast, isPast]
    EventInput:
      type: object
      properties:
        title: { type: string }
        venue: { type: string }
        city: { type: string }
        address: { type: string }
        mapsUrl: { type: string, nullable: true }
        ticketUrl: { type: string, nullable: true }
        price: { type: string, nullable: true }
        eventDate: { type: string, format: date-time }
        posterUrl: { type: string, nullable: true }
        description: { type: string, nullable: true }
        forcePast: { type: boolean }
      required: [title, venue, city, address, eventDate]

    BkidMember:
      type: object
      properties:
        id: { type: integer }
        serial: { type: string }
        name: { type: string }
        email: { type: string, nullable: true }
        photoUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, serial, name, createdAt]
    BkidInput:
      type: object
      properties:
        name: { type: string }
        email: { type: string, nullable: true }
        photoUrl: { type: string, nullable: true }
      required: [name]
    BkidStats:
      type: object
      properties:
        total: { type: integer }
        latestSerial: { type: string, nullable: true }
      required: [total]

    SiteSettings:
      type: object
      properties:
        colorBackground: { type: string }
        colorTitle: { type: string }
        colorText: { type: string }
        colorAccent: { type: string }
        glitchMode: { type: boolean }
        recruitmentTitle: { type: string }
        recruitmentSubtitle: { type: string }
        recruitmentBassist: { type: string }
        recruitmentDrummer: { type: string }
        recruitmentContact: { type: string }
        heroTagline: { type: string }
        footerCoords: { type: string }
        footerCity: { type: string }
      required:
        - colorBackground
        - colorTitle
        - colorText
        - colorAccent
        - glitchMode
        - recruitmentTitle
        - recruitmentSubtitle
        - recruitmentBassist
        - recruitmentDrummer
        - recruitmentContact
        - heroTagline
        - footerCoords
        - footerCity

    ContentBlock:
      type: object
      properties:
        id: { type: integer }
        key: { type: string }
        title: { type: string, nullable: true }
        body: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
      required: [id, key]
    ContentBlockInput:
      type: object
      properties:
        title: { type: string, nullable: true }
        body: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }

    Track:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        artist: { type: string, nullable: true }
        url: { type: string }
        durationSec: { type: integer, nullable: true }
      required: [id, title, url]
    TrackInput:
      type: object
      properties:
        title: { type: string }
        artist: { type: string, nullable: true }
        url: { type: string }
        durationSec: { type: integer, nullable: true }
      required: [title, url]

    LoginInput:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]

    AuthSession:
      type: object
      properties:
        authenticated: { type: boolean }
        username: { type: string, nullable: true }
      required: [authenticated]
